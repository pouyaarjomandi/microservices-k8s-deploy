{{- if .Values.networkPolicy.enabled }}

{{- if .Values.networkPolicy.defaultDenyAll }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  labels:
    {{- include "online-boutique.commonLabels" $ | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
{{- end }}

{{- if .Values.networkPolicy.allowDNS }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  labels:
    {{- include "online-boutique.commonLabels" $ | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}

{{- $ingressNs := dig "ingressNamespace" "name" "ingress-nginx" .Values.networkPolicy }}

{{- if .Values.services.frontend.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "online-boutique.commonLabels" $ | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $ingressNs | quote }}
      ports:
        - port: {{ .Values.services.frontend.port }}
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: productcatalogservice
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: {{ .Values.services.productcatalogservice.port }}
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: currencyservice
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: {{ .Values.services.currencyservice.port }}
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cartservice
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: {{ .Values.services.cartservice.port }}
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: recommendationservice
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: {{ .Values.services.recommendationservice.port }}
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: shippingservice
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: {{ .Values.services.shippingservice.port }}
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: checkoutservice
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: {{ .Values.services.checkoutservice.port }}
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: adservice
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: {{ .Values.services.adservice.port }}
          protocol: TCP
{{- end }}

