{{- if and .Values.rbac.enabled .Values.rbac.developerAccess.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer-access
  labels:
    {{- include "online-boutique.commonLabels" $ | nindent 4 }}
rules:
  # Read access to common resources
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
  
  - apiGroups: [""]
    resources:
      - pods/log
      - pods/status
    verbs:
      - get
      - list
      - watch
  
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
    verbs:
      - get
      - list
      - watch
  
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
  
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - get
      - list
      - watch
  
  {{- if .Values.rbac.developerAccess.allowWrite }}
  # Write access (only when allowWrite is true)
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
    verbs:
      - create
      - update
      - patch
      - delete
  
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs:
      - create
      - update
      - patch
      - delete
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-access-binding
  labels:
    {{- include "online-boutique.commonLabels" $ | nindent 4 }}
subjects:
  - kind: Group
    name: {{ .Values.rbac.developerAccess.groupName | default "developers" }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: developer-access
  apiGroup: rbac.authorization.k8s.io
{{- end }}